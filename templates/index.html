<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Eyes — Pediatric Ophthalmology Video Library</title>
  <link rel="icon" href="/static/kids-eyes-logo.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #F4BDD7;
      --blue:   #8DD3E0;
      --dark:   #2C3E50;
      --gray:   #666;
      --light:  #F7F9FB;
      --white:  #fff;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--dark);
      background: var(--light);
      line-height: 1.5;
    }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 3px solid var(--pink);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-img {
      height: 46px;
      width: auto;
    }
    .logo-text {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
    }
    .site-nav a {
      margin-left: 6px;
      text-decoration: none;
      color: var(--dark);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 7px 14px;
      border-radius: 7px;
      transition: background 0.18s;
    }
    .site-nav a:hover { background: var(--pink); }
    .site-nav a.active { background: var(--pink); font-weight: 600; }

    /* ── Hero ── */
    .hero {
      background: var(--white);
      border-bottom: 1px solid #e8e8e8;
      padding: 28px 24px 32px;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 30px;
      align-items: start;
    }

    /* Responsive player wrapper — maintains 16:9 without overlapping player */
    .player-wrap {
      position: relative;
      padding-top: 56.25%;
      background: #111;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .player-wrap > #yt-player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* Target the iframe the YT API injects */
    .player-wrap iframe {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* Video info panel */
    .video-info {
      padding: 4px 0;
    }
    .video-info-title {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      color: var(--dark);
    }
    .video-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 14px;
    }
    .stat {
      font-size: 0.82rem;
      color: var(--gray);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-icon { font-size: 0.9rem; }
    .video-info-desc {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-info-placeholder {
      color: var(--gray);
      font-size: 0.95rem;
      padding: 20px 0;
    }

    /* ── Library ── */
    .library {
      padding: 32px 24px 48px;
    }
    .library-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .library-heading {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--dark);
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 22px;
    }
    #search {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      background: var(--white);
    }
    #search:focus { border-color: var(--blue); }

    .sort-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sort-btn {
      padding: 8px 14px;
      border: 2px solid #ddd;
      background: var(--white);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--dark);
      font-weight: 500;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .sort-btn:hover { border-color: var(--blue); }
    .sort-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
      font-weight: 600;
    }

    /* ── Video grid ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .card.playing {
      border-color: var(--blue);
    }
    .card.playing .card-title {
      color: #1a7a8a;
    }

    .thumb-wrap {
      position: relative;
      padding-top: 56.25%;
      background: #ddd;
      overflow: hidden;
    }
    .thumb-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.25s;
    }
    .card:hover .thumb-wrap img { transform: scale(1.03); }

    .duration-badge {
      position: absolute;
      bottom: 7px;
      right: 8px;
      background: rgba(0,0,0,0.78);
      color: #fff;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .playing-badge {
      position: absolute;
      top: 7px;
      left: 8px;
      background: var(--blue);
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      display: none;
    }
    .card.playing .playing-badge { display: block; }

    .card-body {
      padding: 13px 14px 14px;
    }
    .card-title {
      font-size: 0.93rem;
      font-weight: 600;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .card-meta {
      font-size: 0.78rem;
      color: var(--gray);
      margin-bottom: 5px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: #777;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.45;
    }

    /* ── State messages ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .state-msg p { font-size: 1rem; }
    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 4px solid var(--pink);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .site-footer {
      background: var(--dark);
      color: rgba(255,255,255,0.75);
      padding: 30px 24px;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-practice { font-weight: 600; color: #fff; margin-bottom: 3px; }
    .footer-info p { font-size: 0.87rem; line-height: 1.6; }
    .footer-link {
      color: var(--blue);
      text-decoration: none;
    }
    .footer-link:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .hero-inner {
        grid-template-columns: 1fr;
      }
      .video-info { padding: 0; }
    }
    @media (max-width: 600px) {
      .logo-text { font-size: 1.2rem; }
      .controls { flex-direction: column; align-items: stretch; }
      #search { min-width: 0; width: 100%; }
      .footer-inner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo-link">
      <img src="/static/kids-eyes-logo.png" alt="Kids Eyes logo" class="logo-img"
           onerror="this.style.display='none'">
      <span class="logo-text">Kids Eyes</span>
    </a>
    <nav class="site-nav">
      <a href="/" class="active">Video Library</a>
      <a href="/contact">Contact</a>
    </nav>
  </div>
</header>

<!-- ── Hero Player ── -->
<section class="hero">
  <div class="hero-inner">
    <!-- YouTube IFrame Player — no overlays per API requirements -->
    <div class="player-wrap">
      <div id="yt-player"></div>
    </div>

    <!-- Video info panel -->
    <div class="video-info" id="video-info-panel">
      <p class="video-info-placeholder">Select a video from the library below to begin watching.</p>
    </div>
  </div>
</section>

<!-- ── Video Library ── -->
<section class="library">
  <div class="library-inner">
    <h2 class="library-heading">Video Library</h2>
    <div class="controls">
      <input type="search" id="search" placeholder="Search by title or topic...">
      <div class="sort-group">
        <button class="sort-btn active" data-sort="date">Newest</button>
        <button class="sort-btn" data-sort="title">A–Z</button>
        <button class="sort-btn" data-sort="duration">Duration</button>
        <button class="sort-btn" data-sort="views">Most Viewed</button>
      </div>
    </div>
    <div class="video-grid" id="video-grid">
      <div class="state-msg">
        <div class="spinner"></div>
        <p>Loading videos...</p>
      </div>
    </div>
  </div>
</section>

<!-- ── Footer ── -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-info">
      <p class="footer-practice">Pediatric Eye Physicians &amp; Surgeons</p>
      <p>Dr. Martin C. Wilson, M.D. &nbsp;·&nbsp; Pediatric Ophthalmology</p>
      <p>155 W Lancaster Ave, Paoli, PA 19301 &nbsp;·&nbsp;
        <a href="tel:6109938083" class="footer-link">(610) 993-8083</a>
      </p>
    </div>
    <div>
      <a href="https://www.youtube.com/@martinwilson3510" target="_blank" rel="noopener"
         class="footer-link">YouTube Channel</a>
    </div>
  </div>
</footer>

<script>
  // ── YouTube IFrame API ──────────────────────────────────────────────────────
  // Loaded per https://developers.google.com/youtube/iframe_api_reference
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  var firstScript = document.getElementsByTagName('script')[0];
  firstScript.parentNode.insertBefore(tag, firstScript);

  var player;
  var playerReady = false;
  var pendingLoad = null; // { id, play }

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height: '315',
      width: '560',
      playerVars: { playsinline: 1 },
      events: {
        onReady: function () {
          playerReady = true;
          if (pendingLoad) {
            doPlayerLoad(pendingLoad.id, pendingLoad.play);
            pendingLoad = null;
          }
        }
      }
    });
  }

  function doPlayerLoad(videoId, play) {
    if (play) {
      player.loadVideoById(videoId);
    } else {
      player.cueVideoById(videoId);
    }
  }

  // ── Video data ──────────────────────────────────────────────────────────────
  var allVideos = [];
  var videoMap  = {};
  var currentVideoId = null;
  var currentSort    = 'date';
  var currentSearch  = '';

  async function loadVideos() {
    try {
      var res = await fetch('/api/videos');
      allVideos = await res.json();
      allVideos.forEach(function (v) { videoMap[v.id] = v; });
      applyAndRender();
      if (allVideos.length > 0) {
        // Pick a random video to show initially (no autoplay)
        var rand = allVideos[Math.floor(Math.random() * allVideos.length)];
        setHeroVideo(rand.id, false);
      }
    } catch (err) {
      document.getElementById('video-grid').innerHTML =
        '<div class="state-msg"><p>Could not load videos. Please try again later.</p></div>';
    }
  }

  function setHeroVideo(videoId, play) {
    var video = videoMap[videoId];
    if (!video) return;
    currentVideoId = videoId;

    // Update info panel
    var panel = document.getElementById('video-info-panel');
    panel.innerHTML =
      '<h2 class="video-info-title">' + esc(video.title) + '</h2>' +
      '<div class="video-stats">' +
        '<span class="stat"><span class="stat-icon">&#128197;</span>' + formatDate(video.publishedAt) + '</span>' +
        '<span class="stat"><span class="stat-icon">&#9202;</span>' + esc(video.duration) + '</span>' +
        (video.viewCount ? '<span class="stat"><span class="stat-icon">&#128065;</span>' + formatNum(video.viewCount) + ' views</span>' : '') +
        (video.likeCount ? '<span class="stat"><span class="stat-icon">&#128077;</span>' + formatNum(video.likeCount) + '</span>' : '') +
      '</div>' +
      '<p class="video-info-desc">' + esc(video.description) + '</p>';

    // Load into player
    if (playerReady) {
      doPlayerLoad(videoId, play);
    } else {
      pendingLoad = { id: videoId, play: play };
    }

    // Update card highlights
    document.querySelectorAll('.card').forEach(function (c) {
      c.classList.toggle('playing', c.dataset.videoId === videoId);
    });

    if (play) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function applyAndRender() {
    var sorted = sortVideos(allVideos.slice(), currentSort);
    var filtered = currentSearch
      ? sorted.filter(function (v) {
          var q = currentSearch.toLowerCase();
          return v.title.toLowerCase().includes(q) ||
                 v.description.toLowerCase().includes(q);
        })
      : sorted;
    renderCards(filtered);
  }

  function sortVideos(vids, sort) {
    switch (sort) {
      case 'title':    return vids.sort(function (a, b) { return a.title.localeCompare(b.title); });
      case 'date':     return vids.sort(function (a, b) { return new Date(b.publishedAt) - new Date(a.publishedAt); });
      case 'duration': return vids.sort(function (a, b) { return b.durationSeconds - a.durationSeconds; });
      case 'views':    return vids.sort(function (a, b) { return b.viewCount - a.viewCount; });
      default:         return vids;
    }
  }

  function renderCards(vids) {
    var grid = document.getElementById('video-grid');
    if (!vids.length) {
      grid.innerHTML = '<div class="state-msg"><p>No videos match your search.</p></div>';
      return;
    }
    grid.innerHTML = vids.map(function (v) {
      var isPlaying = v.id === currentVideoId;
      return '<div class="card' + (isPlaying ? ' playing' : '') + '" data-video-id="' + esc(v.id) + '">' +
        '<div class="thumb-wrap">' +
          '<img src="' + esc(v.thumbnail) + '" alt="' + esc(v.title) + '" loading="lazy">' +
          '<span class="duration-badge">' + esc(v.duration) + '</span>' +
          '<span class="playing-badge">Now Playing</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<h3 class="card-title">' + esc(v.title) + '</h3>' +
          '<p class="card-meta">' + formatDate(v.publishedAt) +
            (v.viewCount ? ' &nbsp;·&nbsp; ' + formatNum(v.viewCount) + ' views' : '') + '</p>' +
          '<p class="card-desc">' + esc(v.description.slice(0, 130)) + (v.description.length > 130 ? '\u2026' : '') + '</p>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── Event listeners ─────────────────────────────────────────────────────────
  // Card click via event delegation
  document.getElementById('video-grid').addEventListener('click', function (e) {
    var card = e.target.closest('.card');
    if (!card) return;
    setHeroVideo(card.dataset.videoId, true);
  });

  // Search
  document.getElementById('search').addEventListener('input', function () {
    currentSearch = this.value.trim();
    applyAndRender();
  });

  // Sort buttons
  document.querySelectorAll('.sort-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      currentSort = this.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      applyAndRender();
    });
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function formatNum(n) {
    if (!n && n !== 0) return '';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
    return n.toLocaleString();
  }

  // ── Boot ────────────────────────────────────────────────────────────────────
  loadVideos();
</script>
</body>
</html>
